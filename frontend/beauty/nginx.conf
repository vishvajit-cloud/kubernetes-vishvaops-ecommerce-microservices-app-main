server {
    listen 80;
    server_name localhost;

    # Serve files directly when requested (root)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Handle requests under /beauty — serve the same files
    location /beauty/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Redirect /beauty (no trailing slash) → /beauty/
    location = /beauty {
        return 301 /beauty/;
    }
}
