server {
    listen 80;
    server_name localhost;

    # Serve files directly when requested (root)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Handle requests under /googlegrocery — serve the same files
    location /googlegrocery/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Redirect /googlegrocery (no trailing slash) → /googlegrocery/
    location = /googlegrocery {
        return 301 /googlegrocery/;
    }
}
