server {
    listen 80;
    server_name localhost;

    # Serve files directly when requested (root)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Handle requests under /mobiles — serve the same files
    location /mobiles/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Redirect /mobiles (no trailing slash) → /mobiles/
    location = /mobiles {
        return 301 /mobiles/;
    }
}
