server {
    listen 80;
    server_name localhost;

    # Serve files directly when requested (root)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Handle requests under /two-wheelers — serve the same files
    location /two-wheelers/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Redirect /two-wheelers (no trailing slash) → /two-wheelers/
    location = /two-wheelers {
        return 301 /two-wheelers/;
    }
}
